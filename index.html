<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wasan Hub</title>
<style>
  :root{
    --ink:#1c2b2d;
    --paper:#eef2ee;
    --line:#c7d1c8;
    --accent:#2f6f5e;
    --accent-soft:#e4efe9;
    --side-w:220px;
    --side-w-tablet:76px;
    --tab-h:64px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;
    height:100%;
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    overscroll-behavior:none;
  }

  .app{
    display:flex;
    height:100vh;
    height:100dvh; /* actual visible height on mobile browsers */
    width:100vw;
    overflow:hidden;
  }

  /* Sidebar */
  .sidebar{
    width:var(--side-w);
    flex-shrink:0;
    background:var(--ink);
    color:var(--paper);
    display:flex;
    flex-direction:column;
    padding:20px 0;
    transition:width .18s ease, padding .18s ease;
    overflow:hidden;
  }
  .app.collapsed .sidebar{
    width:0;
    padding:0;
    overflow:hidden;
  }
  .brand{
    font-size:15px;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-weight:700;
    padding:0 20px 20px;
    border-bottom:1px solid rgba(255,255,255,.15);
    margin-bottom:10px;
    white-space:nowrap;
  }
  .brand span{color:var(--accent);}

  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 20px;
    min-height:48px; /* comfortable touch target */
    cursor:pointer;
    font-size:14px;
    color:rgba(255,255,255,.75);
    border-left:3px solid transparent;
    transition:background .15s ease, color .15s ease;
    user-select:none;
    -webkit-touch-callout:none;
  }
  .nav-item:hover{
    background:rgba(255,255,255,.06);
    color:#fff;
  }
  .nav-item.active{
    background:rgba(255,255,255,.1);
    color:#fff;
    border-left-color:var(--accent);
  }
  .nav-dot{
    width:6px;height:6px;border-radius:50%;
    background:currentColor;
    opacity:.6;
    flex-shrink:0;
  }
  .nav-label{ white-space:nowrap; }

  .sidebar-footer{
    margin-top:auto;
    padding:14px 20px;
    font-size:11px;
    color:rgba(255,255,255,.35);
  }

  /* Main area */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    height:48px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    padding-top:env(safe-area-inset-top);
    height:calc(48px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line);
    background:#fff;
    position:relative;
    z-index:2;
    gap:12px;
  }
  .topbar-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
    flex:1;
    overflow:hidden;
  }
  .menu-toggle{
    flex-shrink:0;
    width:32px;
    height:32px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .menu-toggle:hover{ background:var(--accent-soft); }
  .menu-toggle svg{ width:16px; height:16px; display:block; }
  .topbar-brand{
    flex-shrink:0;
    border:none;
    background:none;
    padding:0;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    letter-spacing:.05em;
    color:var(--ink);
    display:flex;
    align-items:baseline;
    gap:3px;
  }
  .topbar-brand span{ color:var(--accent); }
  .topbar-divider{
    width:1px;
    height:16px;
    background:var(--line);
    flex-shrink:0;
  }
  .topbar-title{
    font-size:14px;
    font-weight:600;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .topbar-link{
    font-size:12px;
    color:var(--accent);
    text-decoration:none;
    border:1px solid var(--accent);
    padding:6px 12px;
    border-radius:5px;
    min-height:32px;
    display:inline-flex;
    align-items:center;
  }
  .topbar-link:hover{ background:var(--accent-soft); }

  .frame-wrap{
    flex:1;
    position:relative;
    background:#fff;
    -webkit-overflow-scrolling:touch;
    overflow:hidden;
  }
  iframe{
    position:absolute;
    top:0;left:0;
    width:100%;
    height:100%;
    border:0;
    background:#fff;
    -webkit-overflow-scrolling:touch;
  }
  .hidden{ display:none; }

  .loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    color:#7a8a80;
  }

  /* Tablet (iPad portrait/landscape, small laptops): same layout as desktop, full labels */
  @media (max-width:1024px) and (min-width:721px){
    .topbar-title{ font-size:15px; }
  }

  /* Phone: bottom tab bar, app-like */
  @media (max-width:720px){
    .app{ flex-direction:column; }

    .main{ order:1; }

    .sidebar{
      order:2;
      width:100%;
      flex-direction:row;
      justify-content:space-around;
      align-items:stretch;
      padding:4px 0 max(4px, env(safe-area-inset-bottom));
      position:sticky;
      bottom:0;
      flex-shrink:0;
      box-shadow:0 -2px 8px rgba(0,0,0,.15);
    }
    .brand, .sidebar-footer{ display:none; }

    .nav-item{
      flex:1;
      flex-direction:column;
      justify-content:center;
      gap:4px;
      padding:8px 4px;
      min-height:52px;
      font-size:11px;
      text-align:center;
      border-left:none;
      border-top:3px solid transparent;
      white-space:nowrap;
    }
    .nav-item.active{ border-left:none; border-top-color:var(--accent); background:rgba(255,255,255,.08); }
    .nav-dot{ width:8px; height:8px; }
    .nav-label{ white-space:nowrap; }

    .topbar-link{ font-size:11px; padding:5px 9px; }
  }

  /* Landscape phones: slightly tighter tab bar */
  @media (max-width:720px) and (orientation:landscape){
    .nav-item{ min-height:44px; padding:6px 4px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="brand"><span class="brand-text">Wasan <span>Hub</span></span></div>

    <div class="nav-item active" data-target="dashboard">
      <span class="nav-dot"></span><span class="nav-label">Dashboard</span>
    </div>
    <div class="nav-item" data-target="nongwiu">
      <span class="nav-dot"></span><span class="nav-label">Nongwiu</span>
    </div>
    <div class="nav-item" data-target="invoice">
      <span class="nav-dot"></span><span class="nav-label">Invoice</span>
    </div>

    <div class="sidebar-footer">รวม 3 เว็บแอปไว้ที่เดียว</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle" aria-label="ย่อ/ขยายเมนู" title="ย่อ/ขยายเมนู">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="7" x2="20" y2="7"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="17" x2="20" y2="17"></line>
          </svg>
        </button>
        <button class="topbar-brand" id="topbar-brand" title="กลับไปหน้ารวมเว็บแอป">WASAN <span>HUB</span></button>
        <div class="topbar-divider"></div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
      </div>
      <a class="topbar-link" id="open-new-tab" href="https://wasant-print.github.io/wasandashboard/" target="_blank" rel="noopener">เปิดแท็บใหม่ ↗</a>
    </div>

    <div class="frame-wrap">
      <div class="loading" id="loading-dashboard">กำลังโหลด Dashboard…</div>
      <iframe id="frame-dashboard" src="https://wasant-print.github.io/wasandashboard/" onload="document.getElementById('loading-dashboard').style.display='none'"></iframe>

      <div class="loading hidden" id="loading-nongwiu">กำลังโหลด Nongwiu…</div>
      <iframe class="hidden" id="frame-nongwiu" data-src="https://wasant-print.github.io/nongwiu/" onload="document.getElementById('loading-nongwiu').style.display='none'"></iframe>

      <div class="loading hidden" id="loading-invoice">กำลังโหลด Invoice…</div>
      <iframe class="hidden" id="frame-invoice" data-src="https://wasant-print.github.io/wasaninvoice/" onload="document.getElementById('loading-invoice').style.display='none'"></iframe>
    </div>
  </div>
</div>

<script>
  const sites = {
    dashboard: { title: "Dashboard", url: "https://wasant-print.github.io/wasandashboard/" },
    nongwiu:   { title: "Nongwiu",   url: "https://wasant-print.github.io/nongwiu/" },
    invoice:   { title: "Invoice",   url: "https://wasant-print.github.io/wasaninvoice/" }
  };

  const navItems = document.querySelectorAll(".nav-item");
  const titleEl = document.getElementById("topbar-title");
  const newTabLink = document.getElementById("open-new-tab");
  const appEl = document.querySelector(".app");
  const menuToggle = document.getElementById("menu-toggle");
  const topbarBrand = document.getElementById("topbar-brand");

  // restore saved collapse preference
  try {
    if (localStorage.getItem("wasanhub_collapsed") === "1") {
      appEl.classList.add("collapsed");
    }
  } catch (e) { /* localStorage unavailable, ignore */ }

  function saveCollapsedState() {
    try {
      localStorage.setItem("wasanhub_collapsed", appEl.classList.contains("collapsed") ? "1" : "0");
    } catch (e) { /* ignore */ }
  }

  // hamburger: toggle open/closed
  menuToggle.addEventListener("click", () => {
    appEl.classList.toggle("collapsed");
    saveCollapsedState();
  });

  // brand name: always brings the menu back (go to hub mode)
  topbarBrand.addEventListener("click", () => {
    appEl.classList.remove("collapsed");
    saveCollapsedState();
  });

  navItems.forEach(item => {
    item.addEventListener("click", () => {
      const target = item.dataset.target;

      // update active nav state
      navItems.forEach(n => n.classList.remove("active"));
      item.classList.add("active");

      // update topbar
      titleEl.textContent = sites[target].title;
      newTabLink.href = sites[target].url;

      // show/hide frames, lazy-load on first click
      Object.keys(sites).forEach(key => {
        const frame = document.getElementById("frame-" + key);
        const loading = document.getElementById("loading-" + key);
        if (key === target) {
          if (!frame.src) {
            frame.src = frame.dataset.src;
            loading.classList.remove("hidden");
          }
          frame.classList.remove("hidden");
          loading.classList.toggle("hidden", !!frame.src && frame.src !== "");
        } else {
          frame.classList.add("hidden");
          loading.classList.add("hidden");
        }
      });

      // slide the menu away automatically after picking an app
      setTimeout(() => {
        appEl.classList.add("collapsed");
        saveCollapsedState();
      }, 220);
    });
  });
</script>

</body>
</html>
